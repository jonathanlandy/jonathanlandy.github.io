<style>
#tag-filter {
  margin-top: 1em;
  margin-bottom: 1.5em;
  display: flex;
  flex-wrap: wrap;
  gap: 0.4em;
}
.tag-btn {
  padding: 0.25em 0.75em;
  border: 1px solid #aaa;
  border-radius: 3px;
  background: transparent;
  cursor: pointer;
  font-size: 0.85em;
}
.tag-btn.active {
  background: #333;
  color: #fff;
  border-color: #333;
}
#archive-list {
  list-style: none;
  padding: 0;
}
#archive-list li {
  display: flex;
  align-items: baseline;
  gap: 1em;
  margin: 0.4em 0;
}
.archive-date {
  flex-shrink: 0;
  font-family: monospace;
  font-size: 0.9em;
}
</style>

<script>
(function () {
  var buttons = document.querySelectorAll('.tag-btn');
  var items = document.querySelectorAll('#archive-list li');

  buttons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      buttons.forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var tag = btn.dataset.tag;
      items.forEach(function (li) {
        var tags = li.dataset.tags ? li.dataset.tags.split('|') : [];
        li.style.display = (tag === 'all' || tags.indexOf(tag) !== -1) ? '' : 'none';
      });
    });
  });
})();
</script>
